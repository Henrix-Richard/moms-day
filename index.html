<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MOMdel · Investment Memorandum</title>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper-100);
    color: var(--ink-1000);
    font-family: var(--font-sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---------- Boot screen ---------- */
  .boot {
    position: fixed; inset: 0; z-index: 100;
    background: var(--ink-1000);
    color: var(--paper-50);
    display: flex; flex-direction: column;
    padding: clamp(24px, 5vw, 56px);
    transition: opacity 600ms var(--ease-out);
  }
  .boot.exit { opacity: 0; pointer-events: none; }
  .boot-top {
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: var(--tracking-xwide); text-transform: uppercase;
    color: var(--ink-300);
  }
  .boot-top .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 99px;
    background: var(--signal-500); margin-right: 8px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }
  .boot-body {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    max-width: 760px; margin: 0 auto; width: 100%;
  }
  .boot-title {
    font-family: var(--font-display);
    font-size: clamp(40px, 7vw, 88px);
    font-weight: 500;
    line-height: 1.0; letter-spacing: -0.04em;
    color: var(--paper-50);
    margin-bottom: 32px;
  }
  .boot-title .mom { font-style: italic; }
  .boot-title .signal { color: var(--signal-500); }
  .boot-lines {
    font-family: var(--font-mono);
    font-size: 13px; line-height: 1.8;
    color: var(--ink-300);
  }
  .boot-line {
    display: flex; align-items: center; gap: 12px;
    opacity: 0; transform: translateY(4px);
    animation: bootIn 240ms var(--ease-out) forwards;
  }
  @keyframes bootIn {
    to { opacity: 1; transform: translateY(0); }
  }
  .boot-line .arrow { color: var(--ink-500); }
  .boot-line .label { color: var(--paper-50); flex: 1; }
  .boot-line .status { color: var(--ink-500); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
  .boot-line.done .status { color: #4FB37A; }
  .boot-line .bar {
    width: 80px; height: 2px; background: var(--ink-900); position: relative; overflow: hidden;
  }
  .boot-line .bar::after {
    content: ''; position: absolute; inset: 0;
    background: var(--signal-500);
    transform: translateX(-100%);
    animation: fill 1100ms var(--ease-out) forwards;
  }
  .boot-line.done .bar::after { background: var(--paper-50); transform: translateX(0); }
  @keyframes fill { to { transform: translateX(0); } }
  .boot-bottom {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: var(--tracking-xwide); text-transform: uppercase;
    color: var(--ink-500);
    display: flex; justify-content: space-between;
  }
  .caret { display: inline-block; width: 8px; height: 14px; background: var(--signal-500); margin-left: 4px; vertical-align: -2px; animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* ---------- App chrome ---------- */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    background: var(--paper-50);
    border-bottom: 1px solid var(--paper-300);
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: var(--tracking-xwide); text-transform: uppercase;
    color: var(--ink-500);
  }
  .topbar .brand {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-display); font-size: 16px; font-weight: 500;
    letter-spacing: -0.02em; color: var(--ink-1000);
    text-transform: none;
  }
  .topbar .brand .logo {
    width: 22px; height: 22px; border-radius: 6px;
    background: var(--grad-ace);
    border: 1px solid var(--paper-300);
    display: grid; place-items: center;
    font-family: var(--font-display); font-size: 11px; font-weight: 600;
    color: var(--ink-1000); letter-spacing: 0;
  }
  .topbar .brand .italic { font-style: italic; }
  .ticker {
    display: flex; gap: 18px; align-items: center;
    font-variant-numeric: tabular-nums;
  }
  .ticker .ti { display: flex; gap: 6px; align-items: baseline; }
  .ticker .gain { color: var(--gain-500); }
  .ticker .signal { color: var(--signal-500); }
  .ticker .sym { color: var(--ink-1000); font-weight: 500; }

  /* ---------- Layout ---------- */
  .shell {
    max-width: 1240px; margin: 0 auto;
    padding: 48px 32px 96px;
    opacity: 0; transition: opacity 400ms var(--ease-out);
  }
  .shell.ready { opacity: 1; }

  /* Section reveal animation */
  .sec {
    opacity: 0; transform: translateY(14px);
    transition: opacity 600ms var(--ease-out), transform 600ms var(--ease-out);
  }
  .sec.in { opacity: 1; transform: translateY(0); }

  /* Eyebrow / labels */
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tracking-xwide); text-transform: uppercase; color: var(--ink-500); }
  .eyebrow .num { color: var(--ink-300); margin-right: 8px; }
  .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }

  /* Card baseline */
  .card {
    background: var(--paper-50);
    border: 1px solid var(--paper-200);
    border-radius: 14px;
    padding: 24px;
  }
  .hairline { height: 1px; background: var(--paper-300); border: none; margin: 0; }

  /* ---------- Section: Hero / Exec Summary ---------- */
  .hero {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 32px;
    margin-bottom: 64px;
  }
  @media (max-width: 880px) {
    .hero { grid-template-columns: 1fr; }
  }
  .hero-left { padding: 8px 0; }
  .hero-eyebrow { display: flex; gap: 14px; align-items: center; margin-bottom: 28px; }
  .hero-eyebrow .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border: 1px solid var(--paper-300);
    border-radius: 99px;
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: var(--tracking-xwide); text-transform: uppercase;
    color: var(--ink-700);
    background: var(--paper-50);
  }
  .hero-eyebrow .badge .live {
    width: 6px; height: 6px; border-radius: 99px; background: var(--signal-500);
    animation: pulse 1.6s ease-in-out infinite;
  }
  h1.hero-title {
    font-family: var(--font-display);
    font-size: clamp(48px, 7vw, 96px);
    line-height: 0.96; letter-spacing: -0.04em;
    font-weight: 500;
    margin: 0 0 24px;
    text-wrap: balance;
  }
  h1.hero-title em { font-style: italic; }
  .hero-sub {
    font-size: 17px; line-height: 1.5;
    color: var(--ink-700); max-width: 48ch; text-wrap: pretty;
    margin: 0 0 32px;
  }
  .hero-meta {
    display: grid; grid-template-columns: repeat(3, 1fr);
    border-top: 1px solid var(--paper-300);
    padding-top: 20px; gap: 24px;
  }
  .hero-meta .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: var(--tracking-xwide); text-transform: uppercase; color: var(--ink-500); margin-bottom: 6px; }
  .hero-meta .val { font-family: var(--font-display); font-size: 18px; font-weight: 500; letter-spacing: -0.01em; }

  /* Hero ticker card */
  .hero-card {
    background: var(--grad-ace);
    border: 1.5px solid var(--ink-1000);
    border-radius: 14px;
    padding: 24px;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; gap: 18px;
    min-height: 320px;
  }
  .hero-card .corner-tl, .hero-card .corner-br {
    position: absolute; font-family: var(--font-display); font-weight: 500; font-size: 22px;
    color: var(--ink-1000);
  }
  .hero-card .corner-tl { top: 14px; left: 18px; }
  .hero-card .corner-br { bottom: 14px; right: 18px; transform: rotate(180deg); }
  .hero-card .center {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  }
  .hero-card .ticker-sym {
    font-family: var(--font-display); font-size: 72px; font-weight: 500;
    letter-spacing: -0.03em; line-height: 1;
  }
  .hero-card .price-row { display: flex; align-items: baseline; gap: 14px; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .hero-card .price { font-family: var(--font-display); font-size: 40px; font-weight: 500; letter-spacing: -0.02em; }
  .hero-card .delta { color: var(--gain-500); font-size: 14px; font-weight: 500; }
  .hero-card .pill {
    align-self: center;
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    background: var(--ink-1000); color: var(--paper-50);
    padding: 4px 10px; border-radius: 99px;
  }

  /* ---------- Section header ---------- */
  .sec-head {
    display: flex; align-items: end; justify-content: space-between;
    margin-bottom: 20px; padding-bottom: 16px;
    border-bottom: 1px solid var(--paper-300);
  }
  .sec-head .left h2 {
    font-family: var(--font-display); font-size: 32px; font-weight: 500;
    letter-spacing: -0.02em; line-height: 1.1; margin: 4px 0 0;
  }
  .sec-head .left h2 em { font-style: italic; }
  .sec-head .right {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--ink-500);
    display: flex; gap: 14px; align-items: center;
  }
  .sec-block { margin-bottom: 64px; }

  /* ---------- Step 2: Assumptions ---------- */
  .assumptions {
    background: var(--ink-1000); color: var(--paper-50);
    border-radius: 14px;
    padding: 28px 32px;
    font-family: var(--font-mono); font-size: 13px;
  }
  .assumptions .head {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--ink-300); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    padding-bottom: 14px; margin-bottom: 14px;
    border-bottom: 1px solid var(--ink-900);
  }
  .arow {
    display: grid; grid-template-columns: 24px 1fr auto auto;
    gap: 14px; align-items: center;
    padding: 8px 0;
    border-bottom: 1px dashed #1c1c1c;
    opacity: 0; transform: translateY(4px);
    transition: opacity 280ms var(--ease-out), transform 280ms var(--ease-out);
  }
  .arow:last-child { border-bottom: none; }
  .arow.in { opacity: 1; transform: translateY(0); }
  .arow .ln { color: var(--ink-500); font-size: 11px; }
  .arow .lbl { color: var(--paper-50); }
  .arow .calc {
    color: var(--ink-300); font-size: 11px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .arow .calc.hide { display: none; }
  .arow .calc .spinner {
    width: 10px; height: 10px; border-radius: 99px;
    border: 1.5px solid var(--ink-500); border-top-color: var(--paper-50);
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .arow .result {
    opacity: 0; transition: opacity 200ms var(--ease-out);
    font-family: var(--font-mono); font-size: 12px;
    color: #4FB37A;
    text-transform: uppercase; letter-spacing: 0.1em;
    padding: 3px 8px; border: 1px solid #1c5a3a; border-radius: 99px;
    background: rgba(31, 122, 76, 0.12);
  }
  .arow .result.show { opacity: 1; }

  /* ---------- Step 3: Drivers ---------- */
  .drivers {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 12px;
  }
  @media (max-width: 980px) { .drivers { grid-template-columns: repeat(2, 1fr); } }
  .driver {
    background: var(--paper-50);
    border: 1px solid var(--paper-200);
    border-radius: 14px;
    padding: 22px 20px 24px;
    display: flex; flex-direction: column; gap: 12px;
    min-height: 200px;
    opacity: 0; transform: translateY(10px);
    transition: opacity 480ms var(--ease-out), transform 480ms var(--ease-out);
    position: relative;
  }
  .driver.in { opacity: 1; transform: translateY(0); }
  .driver .ord { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; color: var(--ink-300); }
  .driver .glyph {
    width: 36px; height: 36px; border-radius: 8px;
    border: 1px solid var(--paper-300);
    display: grid; place-items: center;
    background: var(--paper-100);
  }
  .driver .glyph svg { width: 18px; height: 18px; }
  .driver .name { font-family: var(--font-display); font-size: 17px; font-weight: 500; letter-spacing: -0.01em; line-height: 1.15; margin-top: auto; }
  .driver .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-500); display: flex; justify-content: space-between; }
  .driver .meta .v { color: var(--gain-500); }
  .driver .bar { height: 2px; background: var(--paper-200); position: relative; overflow: hidden; }
  .driver .bar i { position: absolute; left: 0; top: 0; bottom: 0; background: var(--ink-1000); width: 0%; transition: width 900ms var(--ease-out) 200ms; }
  .driver.in .bar i { width: var(--w, 92%); }

  /* ---------- Step 4: Valuation ---------- */
  .valuation {
    display: grid; grid-template-columns: 1.1fr 1fr; gap: 24px;
  }
  @media (max-width: 980px) { .valuation { grid-template-columns: 1fr; } }
  .compute {
    background: var(--ink-1000); color: var(--paper-50);
    border-radius: 14px;
    padding: 24px;
    font-family: var(--font-mono); font-size: 13px;
    min-height: 280px;
  }
  .compute .h {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--ink-300); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    padding-bottom: 12px; border-bottom: 1px solid var(--ink-900); margin-bottom: 14px;
  }
  .crow {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0;
    color: var(--paper-50);
    opacity: 0; transform: translateY(3px);
    transition: opacity 240ms var(--ease-out), transform 240ms var(--ease-out);
  }
  .crow.in { opacity: 1; transform: translateY(0); }
  .crow .pct { color: var(--ink-300); font-size: 11px; }
  .crow .check { color: #4FB37A; font-size: 11px; opacity: 0; transition: opacity 200ms; }
  .crow .check.show { opacity: 1; }
  .crow.computing .check { display: none; }
  .crow.computing .pct::after {
    content: ''; display: inline-block; margin-left: 8px;
    width: 8px; height: 8px; border-radius: 99px;
    border: 1.5px solid var(--ink-500); border-top-color: var(--paper-50);
    animation: spin 0.7s linear infinite; vertical-align: -1px;
  }
  .compute .converge {
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid var(--ink-900);
    display: flex; justify-content: space-between; align-items: center;
    color: #4FB37A; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    opacity: 0; transition: opacity 400ms var(--ease-out);
  }
  .compute .converge.in { opacity: 1; }

  .val-output {
    display: grid; grid-template-rows: auto 1fr;
    gap: 16px;
  }
  .val-output .grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .val-tile {
    background: var(--paper-50); border: 1px solid var(--paper-200);
    border-radius: 14px; padding: 20px;
    opacity: 0; transform: translateY(10px);
    transition: opacity 500ms var(--ease-out), transform 500ms var(--ease-out);
  }
  .val-tile.in { opacity: 1; transform: translateY(0); }
  .val-tile .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-500); }
  .val-tile .v { font-family: var(--font-display); font-size: 44px; font-weight: 500; letter-spacing: -0.03em; line-height: 1.05; margin-top: 8px; }
  .val-tile .sub { font-family: var(--font-mono); font-size: 11px; color: var(--ink-500); margin-top: 6px; }
  .val-tile.dark { background: var(--ink-1000); color: var(--paper-50); border-color: var(--ink-1000); }
  .val-tile.dark .lbl { color: var(--ink-300); }
  .val-tile.dark .sub { color: var(--ink-300); }
  .val-tile.dark .v { color: #4FB37A; }
  .val-tile .v.inf { font-size: 64px; }
  .val-tile.signal .v { color: var(--signal-500); }

  .val-quote {
    grid-column: 1 / -1;
    border: 1px solid var(--paper-300);
    border-left: 3px solid var(--signal-500);
    padding: 18px 22px;
    border-radius: 4px;
    font-family: var(--font-display); font-size: 18px;
    letter-spacing: -0.01em; line-height: 1.35;
    color: var(--ink-1000); background: var(--paper-50);
    opacity: 0; transform: translateY(8px);
    transition: opacity 500ms var(--ease-out), transform 500ms var(--ease-out);
  }
  .val-quote.in { opacity: 1; transform: translateY(0); }

  /* ---------- Step 5: Risk ---------- */
  .risk-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
  @media (max-width: 880px) { .risk-grid { grid-template-columns: 1fr; } }
  .risk-list { display: flex; flex-direction: column; }
  .risk-row {
    display: grid; grid-template-columns: 32px 1.2fr 1fr 90px;
    gap: 16px; align-items: center;
    padding: 18px 4px;
    border-bottom: 1px solid var(--paper-300);
    opacity: 0; transform: translateY(6px);
    transition: opacity 400ms var(--ease-out), transform 400ms var(--ease-out);
  }
  .risk-row.in { opacity: 1; transform: translateY(0); }
  .risk-row .n { font-family: var(--font-mono); font-size: 11px; color: var(--ink-300); }
  .risk-row .what { font-family: var(--font-display); font-size: 17px; font-weight: 500; letter-spacing: -0.01em; }
  .risk-row .desc { font-size: 13px; color: var(--ink-700); }
  .risk-row .level {
    text-align: right;
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  }
  .risk-row .level .pill {
    display: inline-block; padding: 3px 8px; border-radius: 99px;
    border: 1px solid var(--paper-300); color: var(--ink-700);
  }
  .risk-row.head {
    border-bottom-color: var(--ink-1000);
    padding-bottom: 10px; padding-top: 0;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-500);
  }
  .risk-mit {
    background: var(--ink-1000); color: var(--paper-50);
    border-radius: 14px; padding: 28px;
    display: flex; flex-direction: column; gap: 14px;
    align-self: start;
  }
  .risk-mit .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-300); }
  .risk-mit .h { font-family: var(--font-display); font-size: 26px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.1; }
  .risk-mit .h em { font-style: italic; }
  .risk-mit .note { font-family: var(--font-mono); font-size: 11px; color: var(--ink-300); }

  /* ---------- Step 6: Recommendation ---------- */
  .reco {
    background: var(--ink-1000);
    color: var(--paper-50);
    border-radius: 14px;
    padding: 56px 48px;
    position: relative; overflow: hidden;
  }
  .reco::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(80% 60% at 80% 20%, rgba(209,72,54,0.18) 0%, transparent 60%);
    pointer-events: none;
  }
  .reco .top {
    display: flex; justify-content: space-between; align-items: baseline;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-300); margin-bottom: 32px;
    position: relative;
  }
  .reco-stack { display: grid; grid-template-columns: 1.4fr 1fr; gap: 32px; align-items: end; position: relative; }
  @media (max-width: 980px) { .reco-stack { grid-template-columns: 1fr; } }
  .reco h2.big {
    font-family: var(--font-display);
    font-size: clamp(56px, 9vw, 128px);
    font-weight: 500; letter-spacing: -0.04em; line-height: 0.92;
    margin: 0; color: var(--paper-50);
  }
  .reco h2.big .signal { color: var(--signal-500); }
  .reco .lines {
    display: flex; flex-direction: column; gap: 14px;
  }
  .reco .ln {
    display: grid; grid-template-columns: 28px 1fr auto; gap: 14px; align-items: baseline;
    border-bottom: 1px dashed #2a2a2a; padding-bottom: 12px;
  }
  .reco .ln:last-child { border-bottom: none; }
  .reco .ln .k { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-500); }
  .reco .ln .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-300); }
  .reco .ln .v { font-family: var(--font-display); font-size: 22px; font-weight: 500; letter-spacing: -0.02em; color: var(--paper-50); text-align: right; }
  .reco .ln .v em { font-style: italic; }

  .reco .reveal { opacity: 0; transform: translateY(8px); transition: opacity 500ms var(--ease-out), transform 500ms var(--ease-out); }
  .reco .reveal.in { opacity: 1; transform: translateY(0); }

  /* ---------- Final ---------- */
  .final {
    margin-top: 96px;
    text-align: center;
    padding: 64px 24px 24px;
  }
  .final .heart {
    width: 36px; height: 36px; margin: 0 auto 24px;

  .final p {

  /* ---------- Mobile ---------- */
  @media (max-width: 640px) {
    /* Shell */
    .shell { padding: 28px 16px 64px; }

    /* Topbar */
    .topbar { padding: 12px 16px; }

    .boot-line .status { display: none; }

    /* Final */

  }

  /* ---------- Replay button ---------- */
  .replay {

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

    // ---------- Hero / Exec Summary ----------
    function Hero({ t }) {
      const ASSET_TICKER = (t.assetName || 'MOM').toUpperCase().slice(0, 4);

    // ---------- Master sequence ----------
    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [phase, setPhase] = useState(t.skipBoot ? 'running' : 'boot');
      const [step, setStep]   = useState(0);
      const [done, setDone]   = useState(false);

      useEffect(() => {
        if (phase !== 'boot') return;
        const skip = (e) => {
          if (e.key === 'Escape' || e.key === ' ' || e.key === 'Enter') {
            handleExit();
          }
        };
        window.addEventListener('keydown', skip);
        const bootDur = BOOT_TOTAL / Math.max(0.25, t.speed);
        const t1 = setTimeout(() => handleExit(), bootDur);
        function handleExit() {
          setPhase('exiting');
          setTimeout(() => setPhase('running'), 600);
        }
        return () => { clearTimeout(t1); window.removeEventListener('keydown', skip); };
      }, [phase, t.speed]);

      useEffect(() => {
        if (phase !== 'running') return;
        const SCHEDULE = [
          { step: 1, at: 200    },
          { step: 2, at: 1800   },
          { step: 3, at: 5400   },
          { step: 4, at: 6800   },
          { step: 5, at: 11000  },
          { step: 6, at: 13000  },
          { step: 7, at: 16500  },
        ];
        const sp = Math.max(0.25, t.speed);
        const timers = SCHEDULE.map(s => setTimeout(() => setStep(s.step), s.at / sp));
        const doneT = setTimeout(() => setDone(true), 17500 / sp);
        return () => { timers.forEach(clearTimeout); clearTimeout(doneT); };
      }, [phase, t.speed]);

      const replay = () => {
        setStep(0); setDone(false);
        setPhase(t.skipBoot ? 'running' : 'boot');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      return (
        <>
          {(phase === 'boot' || phase === 'exiting') && <Boot exiting={phase === 'exiting'}/>}

          <div className="topbar">
            <div className="brand">
              <div className="logo">{(t.assetName||'M')[0].toUpperCase()}</div>
              <span><span style={{color:'var(--signal-500)'}}>{(t.assetName||'M')[0].toUpperCase()}</span><span className="italic">{(t.assetName||'OM').slice(1).toUpperCase() || 'OM'}</span>del</span>
            </div>
            <div className="ticker">
              <div className="ti"><span className="sym">{(t.assetName||'MOM').toUpperCase().slice(0,4)}</span><span className="num">∞</span><span className="gain">↑ priceless</span></div>
<div className="ti"><span className="signal">● LIVE</span></div>
            </div>
          </div>

          <main className={`shell ${phase === 'running' ? 'ready' : ''}`}>
            <section className={`sec ${step >= 1 ? 'in' : ''}`} style={{marginBottom: 64}}>
              <Hero t={t}/>
            </section>

            <section className={`sec sec-block ${step >= 2 ? 'in' : ''}`}>
              <div className="sec-head">
                <div className="left">
                  <div className="eyebrow"><span className="num">No. 02</span>Step · Assumptions</div>
                  <h2>Model assumptions, computed live.</h2>
                </div>
                <div className="right">
                  <span>Source: 21 years of lived experience</span>
                </div>
              </div>
              <Assumptions start={step >= 2}/>
            </section>

            <section className={`sec sec-block ${step >= 3 ? 'in' : ''}`}>
              <div className="sec-head">
                <div className="left">
                  <div className="eyebrow"><span className="num">No. 03</span>Step · Value drivers</div>
                  <h2>Five drivers carry the model.</h2>
                </div>
                <div className="right"><span>Weighted equally · all material</span></div>
              </div>
              <Drivers start={step >= 3}/>
            </section>

            <section className={`sec sec-block ${step >= 4 ? 'in' : ''}`}>
              <div className="sec-head">
                <div className="left">
                  <div className="eyebrow"><span className="num">No. 04</span>Step · Valuation</div>
                  <h2>The valuation, <em>converging.</em></h2>
                </div>
                <div className="right"><span>Method · DCF on emotional cash flows</span></div>
              </div>
              <Valuation start={step >= 4}/>
            </section>

            <section className={`sec sec-block ${step >= 5 ? 'in' : ''}`}>
              <div className="sec-head">
                <div className="left">
                  <div className="eyebrow"><span className="num">No. 05</span>Step · Risks</div>
                  <h2>Risks, and the one mitigation.</h2>
                </div>
                <div className="right"><span>All risks · controllable</span></div>
              </div>
              <Risk start={step >= 5}/>
            </section>

            <section className={`sec sec-block ${step >= 6 ? 'in' : ''}`}>
              <div className="sec-head">
                <div className="left">
                  <div className="eyebrow"><span className="num">No. 06</span>Step · Recommendation</div>
                  <h2>Final recommendation.</h2>
                </div>
                <div className="right"><span>Conviction · maximum</span></div>
              </div>
              <Reco start={step >= 6} t={t}/>
            </section>

            <section className={`final ${step >= 7 ? 'in' : ''}`}>
              <svg className="heart" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 21s-7-4.35-9.5-9.5C1 7.5 4 4 7.5 4c2 0 3.5 1 4.5 2.5C13 5 14.5 4 16.5 4 20 4 23 7.5 21.5 11.5 19 16.65 12 21 12 21z"/>
              </svg>
              <h1>Happy Mother's Day, <em>{t.assetName}.</em></h1>
              <p>The numbers were always going to come out this way.</p>
              <div className="sig">Signed, your kid · with love · {new Date(new Date().getFullYear(), 4, 10).toLocaleDateString('en-US', { month: 'long', day: 'numeric' })}</div>
            </section>
          </main>

          <button className={`replay ${done ? 'show' : ''}`} onClick={replay}>↻ Run model again</button>

          <TweaksPanel>
            <TweakSection label="Memorandum">
              <TweakText label="Asset name"
                         value={t.assetName}
                         placeholder="Mom"
                         onChange={(v) => setTweak('assetName', v)} />
              <TweakText label="Coverage since"
                         value={t.coverageSince}
                         placeholder="1995 or 'as long as I can remember'"
                         onChange={(v) => setTweak('coverageSince', v)} />
              <TweakText label="Analyst"
                         value={t.analyst}
                         placeholder="Your kid"
                         onChange={(v) => setTweak('analyst', v)} />
            </TweakSection>
            <TweakSection label="Recommendation">
              <TweakSelect label="Rating"
                           value={t.rating}
                           options={['Strong buy', 'Buy', 'Buy &amp; hold', 'Conviction buy', 'Generational buy']}
                           onChange={(v) => setTweak('rating', v)} />
              <TweakText label="Dividend"
                         value={t.dividend}
                         placeholder="unconditional love"
                         onChange={(v) => setTweak('dividend', v)} />
            </TweakSection>
            <TweakSection label="Playback">
              <TweakSlider label="Animation speed"
                           value={t.speed} min={0.5} max={3} step={0.25} unit="x"
                           onChange={(v) => setTweak('speed', v)} />
              <TweakToggle label="Skip boot screen"
                           value={t.skipBoot}
                           onChange={(v) => setTweak('skipBoot', v)} />
              <TweakButton onClick={replay}>↻ Run model again</TweakButton>
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
